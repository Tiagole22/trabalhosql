{% extends "base.html" %}

{% block content %}
<div class="row g-4">
    <div class="col-md-4">
        <div class="card card-custom p-4">
            <h4 class="fw-bold mb-4">Cadastrar Usuário</h4>
            <form action="/usuarios" method="POST">
                <div class="mb-3">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" name="nome" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-gradient w-100">Salvar Usuário</button>
            </form>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card card-custom p-4">
            <h4 class="fw-bold mb-4">Usuários Cadastrados</h4>
            <table class="table align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>E-mail</th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in usuarios %}
                    <tr>
                        <td>#{{ u.id }}</td>
                        <td class="fw-bold">{{ u.nome }}</td>
                        <td>{{ u.email }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="text-center text-muted">Nenhum usuário encontrado.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
