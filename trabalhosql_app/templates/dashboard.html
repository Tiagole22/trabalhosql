{% extends "base.html" %}

{% block content %}
<div class="row mb-5 align-items-center">
    <div class="col-md-8">
        <h1 class="fw-bold text-dark">Painel de Controle</h1>
    </div>
    <div class="col-md-4 text-end">
        <a href="/novo" class="btn btn-gradient"><i class="bi bi-plus-lg"></i> Criar Novo</a>
    </div>
</div>

<div class="row g-4">
    <div class="col-md-3">
        <div class="card card-custom p-4 text-center border-start border-5 border-primary">
            <h5 class="text-muted text-uppercase small ls-1">Total Pedidos</h5>
            <h2 class="display-4 fw-bold my-2">{{ total }}</h2>
        </div>
    </div>
    
    <div class="col-md-3">
        <div class="card card-custom p-4 text-center border-start border-5 border-info">
            <h5 class="text-info text-uppercase small">Físicos</h5>
            <h2 class="display-4 fw-bold my-2">{{ fisicos }}</h2>
            <i class="bi bi-box-seam text-info fs-4"></i>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card card-custom p-4 text-center border-start border-5 border-success">
            <h5 class="text-success text-uppercase small">Digitais</h5>
            <h2 class="display-4 fw-bold my-2">{{ digitais }}</h2>
            <i class="bi bi-cloud-download text-success fs-4"></i>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card card-custom p-4 text-center border-start border-5 border-warning">
            <h5 class="text-warning text-uppercase small">Serviços</h5>
            <h2 class="display-4 fw-bold my-2">{{ servicos }}</h2>
            <i class="bi bi-calendar-check text-warning fs-4"></i>
        </div>
    </div>
</div>
{% endblock %}
